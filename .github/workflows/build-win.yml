name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Check out Git repository
      uses: actions/checkout@v4   # 升级到了 v4

    - name: Install Node.js
      uses: actions/setup-node@v4 # 升级到了 v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Build Portable EXE
      run: npm run build:win

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4 # 升级到了 v4
      with:
        name: Windows-EXE
        path: release/*.exe